<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <rect width="400" height="400" fill="#FAF7F2"/>
  <g transform="translate(200, 175)">
    <!-- Tablecloth rectangle -->
    <rect x="-80" y="-50" width="160" height="100" rx="4" fill="#FAF7F2" stroke="#C9A96E" stroke-width="2"/>
    <!-- Decorative border pattern -->
    <rect x="-75" y="-45" width="150" height="90" rx="2" fill="none" stroke="#C9A96E" stroke-width="1" stroke-dasharray="8 4" opacity="0.7"/>
    <!-- Corner flourishes -->
    <path d="M -70 -40 Q -55 -40 -55 -25" stroke="#C9A96E" stroke-width="2" fill="none"/>
    <path d="M 70 -40 Q 55 -40 55 -25" stroke="#C9A96E" stroke-width="2" fill="none"/>
    <path d="M -70 35 Q -55 35 -55 20" stroke="#C9A96E" stroke-width="2" fill="none"/>
    <path d="M 70 35 Q 55 35 55 20" stroke="#C9A96E" stroke-width="2" fill="none"/>
    <!-- Small floral accents -->
    <circle cx="-60" cy="-30" r="2" fill="#C9A96E"/>
    <circle cx="60" cy="-30" r="2" fill="#C9A96E"/>
    <circle cx="-60" cy="25" r="2" fill="#C9A96E"/>
    <circle cx="60" cy="25" r="2" fill="#C9A96E"/>
  </g>
  <text x="200" y="295" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#8B7355">Tablecloth with Border</text>
</svg>
